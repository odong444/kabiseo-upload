<!-- AI 플로팅 채팅 버튼 + 패널 -->
<div class="ai-float-wrap" id="aiFloatWrap">
    <div class="ai-float-bubble" id="aiBubble" onclick="toggleAiChat()">
        <span>AI로 캠페인 등록/조회 해보세요!</span>
        <button class="ai-bubble-close" onclick="event.stopPropagation(); dismissBubble();">&times;</button>
    </div>
    <button class="ai-float-btn" id="aiFloatBtn" onclick="toggleAiChat()" title="AI 캠페인 관리">
        <span style="font-size:32px;">🤖</span>
    </button>
</div>

<div id="aiChatPanel" style="display:none;">
    <div class="ai-chat-resize" id="aiResizeHandle"></div>
    <div class="ai-chat-header">
        <span class="ai-chat-title">AI 캠페인 관리</span>
        <div style="display:flex;gap:4px;">
            <button class="ai-chat-hdr-btn" onclick="toggleSessionList()" title="대화 목록" id="aiHistBtn">📋</button>
            <button class="ai-chat-hdr-btn" onclick="toggleAiSize()" title="크게/작게" id="aiSizeBtn">⤢</button>
            <button class="ai-chat-hdr-btn" onclick="resetAiChat()" title="새 대화">↻</button>
            <button class="ai-chat-hdr-btn" onclick="toggleAiChat()" title="닫기">&times;</button>
        </div>
    </div>
    <!-- 세션 목록 패널 -->
    <div id="aiSessionList" style="display:none;flex:1;overflow-y:auto;background:#f8fafc;padding:12px;">
        <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:10px;">최근 대화</div>
        <div id="aiSessionItems"></div>
        <div style="margin-top:12px;text-align:center;">
            <button onclick="startNewSession()" style="padding:8px 20px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">+ 새 대화 시작</button>
        </div>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
        <div class="ai-msg ai">안녕하세요! 캠페인 등록/수정, 진행 데이터 조회/수정, 엑셀 정리를 도와드립니다.</div>
    </div>
    <div class="ai-chat-input-area">
        <textarea id="aiChatInput" placeholder="메시지 입력... (Shift+Enter 줄바꿈)" rows="1"></textarea>
        <button class="ai-chat-send" id="aiSendBtn" onclick="sendAiMessage()">전송</button>
    </div>
</div>

<style>
.ai-float-wrap {
    position: fixed;
    bottom: 24px;
    right: max(24px, calc(50% - 660px));
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
}
.ai-float-bubble {
    background: #1e293b;
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: aiBubblePop 0.4s ease-out, aiBubblePulse 3s ease-in-out 2s infinite;
    position: relative;
    white-space: nowrap;
}
.ai-float-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    right: 24px;
    width: 12px;
    height: 12px;
    background: #1e293b;
    transform: rotate(45deg);
}
.ai-bubble-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    cursor: pointer;
    padding: 0 0 0 4px;
    line-height: 1;
}
.ai-bubble-close:hover { color: #fff; }
@keyframes aiBubblePop {
    0% { opacity: 0; transform: translateY(8px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes aiBubblePulse {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
}
.ai-float-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
.ai-float-btn:hover { box-shadow: 0 6px 28px rgba(59,130,246,0.55); transform: scale(1.08); }
.ai-float-btn:active { transform: scale(0.92); }

#aiChatPanel {
    position: fixed;
    bottom: 110px;
    right: max(24px, calc(50% - 660px));
    width: 480px;
    height: 680px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    z-index: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: aiSlideUp 0.2s ease-out;
}
#aiChatPanel.ai-expanded {
    width: 640px;
    height: calc(100vh - 100px);
}
@keyframes aiSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}

.ai-chat-resize {
    position: absolute;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    cursor: nw-resize;
    z-index: 10;
}

.ai-chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    flex-shrink: 0;
    cursor: default;
}
.ai-chat-title { font-size: 15px; font-weight: 700; color: #fff; }
.ai-chat-hdr-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ai-chat-hdr-btn:hover { background: rgba(255,255,255,0.35); }

.ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8fafc;
}
.ai-msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
}
.ai-msg.ai {
    align-self: flex-start;
    background: #fff;
    color: #1f2937;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
}
.ai-msg.ai a {
    color: #2563eb;
    text-decoration: underline;
    font-weight: 600;
}
.ai-msg .ai-download-link {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 14px;
    background: #059669;
    color: #fff !important;
    text-decoration: none !important;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
}
.ai-msg .ai-download-link:hover { background: #047857; }
.ai-msg.user {
    align-self: flex-end;
    background: #3b82f6;
    color: #fff;
    border-bottom-right-radius: 4px;
}
.ai-typing {
    align-self: flex-start;
    color: #9ca3af;
    font-size: 13px;
    padding: 8px 14px;
}
.ai-typing span { animation: aiBlink 1.4s infinite; }
.ai-typing span:nth-child(2) { animation-delay: .2s; }
.ai-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes aiBlink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

.ai-chat-input-area {
    padding: 10px 12px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #fff;
}
.ai-chat-input-area textarea {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    resize: none;
    max-height: 100px;
    min-height: 38px;
    font-family: inherit;
    line-height: 1.4;
}
.ai-chat-input-area textarea:focus { outline: none; border-color: #3b82f6; }
.ai-chat-send {
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    height: 38px;
    white-space: nowrap;
}
.ai-chat-send:hover { background: #2563eb; }
.ai-chat-send:disabled { background: #93c5fd; cursor: not-allowed; }

.ai-session-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: background 0.15s;
}
.ai-session-item:hover { background: #eff6ff; border-color: #93c5fd; }
.ai-session-item.active { background: #dbeafe; border-color: #3b82f6; }
.ai-session-title {
    flex: 1;
    font-size: 13px;
    color: #1f2937;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.ai-session-time { font-size: 11px; color: #9ca3af; white-space: nowrap; }
.ai-session-del {
    background: none;
    border: none;
    color: #d1d5db;
    font-size: 14px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
}
.ai-session-del:hover { color: #ef4444; }

/* 모바일 */
@media (max-width: 640px) {
    #aiChatPanel, #aiChatPanel.ai-expanded {
        bottom: 0;
        right: 0;
        width: 100%;
        height: 90vh;
        border-radius: 16px 16px 0 0;
    }
    .ai-float-wrap { right: 16px !important; bottom: 16px; }
    .ai-float-btn { width: 56px; height: 56px; }
    .ai-float-btn span { font-size: 26px !important; }
    .ai-float-bubble { font-size: 12px; padding: 8px 12px; }
    .ai-chat-resize { display: none; }
}
</style>

<script>
(function() {
    // 포탈 자동 감지 (admin / agency / client)
    var _aiPortal = window.location.pathname.startsWith('/agency') ? '/agency' :
                    window.location.pathname.startsWith('/client') ? '/client' : '/admin';

    var _aiMessages = [];
    var _aiOpen = false;
    var _aiExpanded = false;
    var chatBox = document.getElementById('aiChatMessages');
    var chatInput = document.getElementById('aiChatInput');
    var sendBtn = document.getElementById('aiSendBtn');
    var panel = document.getElementById('aiChatPanel');
    var sessionListPanel = document.getElementById('aiSessionList');
    var sessionItems = document.getElementById('aiSessionItems');

    // ──────── 세션 관리 ────────
    var _sessionsKey = 'kabiseo_ai_sessions' + _aiPortal.replace('/', '_');
    var _currentKey = 'kabiseo_ai_current' + _aiPortal.replace('/', '_');
    var _currentSessionId = null;
    var MAX_SESSIONS = 20;

    function _getSessions() {
        try { return JSON.parse(localStorage.getItem(_sessionsKey)) || []; } catch(e) { return []; }
    }
    function _saveSessions(list) {
        try { localStorage.setItem(_sessionsKey, JSON.stringify(list.slice(0, MAX_SESSIONS))); } catch(e) {}
    }
    function _genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

    function _getTitle() {
        for (var i = 0; i < _aiMessages.length; i++) {
            if (_aiMessages[i].role === 'user') return _aiMessages[i].content.slice(0, 40);
        }
        return '새 대화';
    }
    function _fmtTime(ts) {
        var d = new Date(ts);
        return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
               d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function _saveCurrentSession() {
        if (!_currentSessionId) return;
        try {
            var display = [];
            chatBox.querySelectorAll('.ai-msg').forEach(function(el) {
                display.push({
                    role: el.classList.contains('user') ? 'user' : 'ai',
                    text: el.textContent,
                    html: el.innerHTML !== el.textContent ? el.innerHTML : undefined
                });
            });
            var sessions = _getSessions();
            var found = false;
            for (var i = 0; i < sessions.length; i++) {
                if (sessions[i].id === _currentSessionId) {
                    sessions[i].messages = _aiMessages;
                    sessions[i].display = display;
                    sessions[i].title = _getTitle();
                    sessions[i].updated = Date.now();
                    found = true;
                    break;
                }
            }
            if (!found && _aiMessages.length > 0) {
                sessions.unshift({
                    id: _currentSessionId,
                    title: _getTitle(),
                    messages: _aiMessages,
                    display: display,
                    created: Date.now(),
                    updated: Date.now()
                });
            }
            sessions.sort(function(a,b) { return b.updated - a.updated; });
            _saveSessions(sessions);
            localStorage.setItem(_currentKey, _currentSessionId);
        } catch(e) {}
    }

    function _loadSession(sessionId) {
        var sessions = _getSessions();
        for (var i = 0; i < sessions.length; i++) {
            if (sessions[i].id === sessionId) {
                _currentSessionId = sessionId;
                _aiMessages = sessions[i].messages || [];
                chatBox.innerHTML = '';
                if (sessions[i].display && sessions[i].display.length > 0) {
                    sessions[i].display.forEach(function(d) {
                        _addMsgEl(d.role, d.text, d.html);
                    });
                } else {
                    chatBox.innerHTML = '<div class="ai-msg ai">안녕하세요! 캠페인 등록/수정, 진행 데이터 조회/수정, 엑셀 정리를 도와드립니다.</div>';
                }
                localStorage.setItem(_currentKey, sessionId);
                _hideSessionList();
                return;
            }
        }
    }

    function _startNew() {
        _saveCurrentSession();
        _currentSessionId = _genId();
        _aiMessages = [];
        chatBox.innerHTML = '<div class="ai-msg ai">안녕하세요! 캠페인 등록/수정, 진행 데이터 조회/수정, 엑셀 정리를 도와드립니다.</div>';
        localStorage.setItem(_currentKey, _currentSessionId);
        fetch(_aiPortal + '/api/ai-chat/reset', {method: 'POST'});
        _hideSessionList();
    }

    // 초기화: 마지막 세션 불러오기
    var lastId = localStorage.getItem(_currentKey);
    if (lastId) {
        var sessions = _getSessions();
        var found = sessions.find(function(s) { return s.id === lastId; });
        if (found) {
            _currentSessionId = lastId;
            _aiMessages = found.messages || [];
            if (found.display && found.display.length > 0) {
                chatBox.innerHTML = '';
                found.display.forEach(function(d) { _addMsgEl(d.role, d.text, d.html); });
            }
        } else {
            _currentSessionId = _genId();
            localStorage.setItem(_currentKey, _currentSessionId);
        }
    } else {
        _currentSessionId = _genId();
        localStorage.setItem(_currentKey, _currentSessionId);
    }

    // 하위호환: 기존 단일 저장 데이터 마이그레이션
    try {
        var oldData = localStorage.getItem('kabiseo_ai_chat');
        if (oldData && _getSessions().length === 0) {
            var parsed = JSON.parse(oldData);
            if (parsed.messages && parsed.messages.length > 0) {
                _aiMessages = parsed.messages;
                var sessions = [{
                    id: _currentSessionId,
                    title: _getTitle(),
                    messages: parsed.messages,
                    display: parsed.display || [],
                    created: Date.now(),
                    updated: Date.now()
                }];
                _saveSessions(sessions);
            }
            localStorage.removeItem('kabiseo_ai_chat');
        }
    } catch(e) {}

    function _saveChatState() { _saveCurrentSession(); }

    // ──────── 세션 목록 UI ────────
    function _renderSessionList() {
        var sessions = _getSessions();
        sessionItems.innerHTML = '';
        if (sessions.length === 0) {
            sessionItems.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:13px;padding:20px;">저장된 대화가 없습니다.</div>';
            return;
        }
        sessions.forEach(function(s) {
            var div = document.createElement('div');
            div.className = 'ai-session-item' + (s.id === _currentSessionId ? ' active' : '');
            div.innerHTML =
                '<div class="ai-session-title">' + (s.title || '새 대화').replace(/</g,'&lt;') + '</div>' +
                '<span class="ai-session-time">' + _fmtTime(s.updated) + '</span>' +
                '<button class="ai-session-del" title="삭제">&times;</button>';
            div.querySelector('.ai-session-title').addEventListener('click', function() {
                _saveCurrentSession();
                _loadSession(s.id);
            });
            div.querySelector('.ai-session-del').addEventListener('click', function(e) {
                e.stopPropagation();
                var list = _getSessions().filter(function(x) { return x.id !== s.id; });
                _saveSessions(list);
                if (s.id === _currentSessionId) _startNew();
                _renderSessionList();
            });
            sessionItems.appendChild(div);
        });
    }

    var _sessionListOpen = false;
    function _hideSessionList() {
        _sessionListOpen = false;
        sessionListPanel.style.display = 'none';
        chatBox.style.display = '';
        document.querySelector('.ai-chat-input-area').style.display = '';
    }

    window.toggleSessionList = function() {
        _sessionListOpen = !_sessionListOpen;
        if (_sessionListOpen) {
            _renderSessionList();
            sessionListPanel.style.display = 'block';
            chatBox.style.display = 'none';
            document.querySelector('.ai-chat-input-area').style.display = 'none';
        } else {
            _hideSessionList();
        }
    };
    window.startNewSession = _startNew;

    function _linkify(text) {
        // /admin|agency|client/api/ai-export/... → 다운로드 버튼
        var t = text.replace(/(?:https?:\/\/[^\s]+)?(\/(?:admin|agency|client)\/api\/ai-export\/[a-f0-9]+)/g,
            '<a href="$1" class="ai-download-link" target="_blank">📥 CSV 다운로드</a>');
        // 일반 URL → 링크
        t = t.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
            if (url.indexOf('ai-export') !== -1) return url; // 이미 처리됨
            return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
        });
        return t;
    }

    function _addMsgEl(role, text, rawHtml) {
        var div = document.createElement('div');
        div.className = 'ai-msg ' + (role === 'user' ? 'user' : 'ai');
        if (rawHtml) {
            div.innerHTML = rawHtml;
        } else if (role === 'ai') {
            div.innerHTML = _linkify(_escapeHtml(text));
        } else {
            div.textContent = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function _escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function _showTyping() {
        var div = document.createElement('div');
        div.className = 'ai-typing';
        div.id = 'aiTyping';
        div.innerHTML = '<span>\u25cf</span><span>\u25cf</span><span>\u25cf</span>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function _hideTyping() {
        var el = document.getElementById('aiTyping');
        if (el) el.remove();
    }

    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendAiMessage();
        }
    });

    var bubble = document.getElementById('aiBubble');
    window.dismissBubble = function() {
        if (bubble) bubble.style.display = 'none';
        try { sessionStorage.setItem('ai_bubble_dismissed', '1'); } catch(e) {}
    };
    // 이미 닫았으면 숨기기
    try { if (sessionStorage.getItem('ai_bubble_dismissed')) { if (bubble) bubble.style.display = 'none'; } } catch(e) {}

    window.toggleAiChat = function() {
        _aiOpen = !_aiOpen;
        panel.style.display = _aiOpen ? 'flex' : 'none';
        if (bubble) bubble.style.display = 'none';
        if (_aiOpen) {
            chatInput.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };

    window.toggleAiSize = function() {
        _aiExpanded = !_aiExpanded;
        panel.classList.toggle('ai-expanded', _aiExpanded);
        document.getElementById('aiSizeBtn').textContent = _aiExpanded ? '⤡' : '⤢';
    };

    // 드래그 리사이즈 (좌상단 코너)
    (function() {
        var handle = document.getElementById('aiResizeHandle');
        var startX, startY, startW, startH;
        handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startX = e.clientX; startY = e.clientY;
            startW = panel.offsetWidth; startH = panel.offsetHeight;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        function onMove(e) {
            var dw = startX - e.clientX;
            var dh = startY - e.clientY;
            panel.style.width = Math.max(360, startW + dw) + 'px';
            panel.style.height = Math.max(400, startH + dh) + 'px';
        }
        function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }
    })();

    window.sendAiMessage = function() {
        var text = chatInput.value.trim();
        if (!text) return;

        _addMsgEl('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtn.disabled = true;

        _aiMessages.push({role: 'user', content: text});
        _showTyping();

        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 90000);

        fetch(_aiPortal + '/api/ai-chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({messages: _aiMessages}),
            signal: controller.signal
        })
        .then(function(r) { clearTimeout(timeoutId); return r.json(); })
        .then(function(data) {
            _hideTyping();
            if (data.ok) {
                _addMsgEl('ai', data.reply);
                _aiMessages = data.messages;
            } else {
                _addMsgEl('ai', '\uc624\ub958: ' + (data.error || '\uc54c \uc218 \uc5c6\ub294 \uc624\ub958'));
            }
            _saveChatState();
        })
        .catch(function(err) {
            clearTimeout(timeoutId);
            _hideTyping();
            if (err.name === 'AbortError') {
                _addMsgEl('ai', '\uc751\ub2f5 \uc2dc\uac04\uc774 \ucd08\uacfc\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uc9c8\ubb38\uc744 \ub354 \uac04\uacb0\ud558\uac8c \ud574\uc8fc\uc138\uc694.');
            } else {
                _addMsgEl('ai', '\ub124\ud2b8\uc6cc\ud06c \uc624\ub958\uac00 \ubc1c\uc0dd\ud588\uc2b5\ub2c8\ub2e4. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.');
            }
            _saveChatState();
        })
        .finally(function() {
            sendBtn.disabled = false;
            chatInput.focus();
        });
    };

    window.resetAiChat = function() {
        _saveCurrentSession();
        _startNew();
    };
})();
</script>
