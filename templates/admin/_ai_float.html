<!-- AI 플로팅 채팅 버튼 + 패널 -->
<button class="ai-float-btn" id="aiFloatBtn" onclick="toggleAiChat()" title="AI 캠페인 관리">
    <span style="font-size:22px;">🤖</span>
</button>

<div id="aiChatPanel" style="display:none;">
    <div class="ai-chat-resize" id="aiResizeHandle"></div>
    <div class="ai-chat-header">
        <span class="ai-chat-title">AI 캠페인 관리</span>
        <div style="display:flex;gap:4px;">
            <button class="ai-chat-hdr-btn" onclick="toggleAiSize()" title="크게/작게" id="aiSizeBtn">⤢</button>
            <button class="ai-chat-hdr-btn" onclick="resetAiChat()" title="새 대화">↻</button>
            <button class="ai-chat-hdr-btn" onclick="toggleAiChat()" title="닫기">&times;</button>
        </div>
    </div>
    <div class="ai-chat-messages" id="aiChatMessages">
        <div class="ai-msg ai">안녕하세요! 캠페인 등록/수정, 진행 데이터 조회/수정, 엑셀 정리를 도와드립니다.</div>
    </div>
    <div class="ai-chat-input-area">
        <textarea id="aiChatInput" placeholder="메시지 입력... (Shift+Enter 줄바꿈)" rows="1"></textarea>
        <button class="ai-chat-send" id="aiSendBtn" onclick="sendAiMessage()">전송</button>
    </div>
</div>

<style>
.ai-float-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #3b82f6;
    border: none;
    box-shadow: 0 2px 12px rgba(59,130,246,0.35);
    cursor: pointer;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
}
.ai-float-btn:hover { box-shadow: 0 4px 20px rgba(59,130,246,0.5); transform: scale(1.05); }
.ai-float-btn:active { transform: scale(0.92); }

#aiChatPanel {
    position: fixed;
    bottom: 84px;
    right: 24px;
    width: 480px;
    height: 680px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    z-index: 300;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: aiSlideUp 0.2s ease-out;
}
#aiChatPanel.ai-expanded {
    width: 640px;
    height: calc(100vh - 100px);
}
@keyframes aiSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
}

.ai-chat-resize {
    position: absolute;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    cursor: nw-resize;
    z-index: 10;
}

.ai-chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    flex-shrink: 0;
    cursor: default;
}
.ai-chat-title { font-size: 15px; font-weight: 700; color: #fff; }
.ai-chat-hdr-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.ai-chat-hdr-btn:hover { background: rgba(255,255,255,0.35); }

.ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8fafc;
}
.ai-msg {
    max-width: 88%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
}
.ai-msg.ai {
    align-self: flex-start;
    background: #fff;
    color: #1f2937;
    border: 1px solid #e5e7eb;
    border-bottom-left-radius: 4px;
}
.ai-msg.ai a {
    color: #2563eb;
    text-decoration: underline;
    font-weight: 600;
}
.ai-msg .ai-download-link {
    display: inline-block;
    margin-top: 6px;
    padding: 6px 14px;
    background: #059669;
    color: #fff !important;
    text-decoration: none !important;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
}
.ai-msg .ai-download-link:hover { background: #047857; }
.ai-msg.user {
    align-self: flex-end;
    background: #3b82f6;
    color: #fff;
    border-bottom-right-radius: 4px;
}
.ai-typing {
    align-self: flex-start;
    color: #9ca3af;
    font-size: 13px;
    padding: 8px 14px;
}
.ai-typing span { animation: aiBlink 1.4s infinite; }
.ai-typing span:nth-child(2) { animation-delay: .2s; }
.ai-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes aiBlink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

.ai-chat-input-area {
    padding: 10px 12px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #fff;
}
.ai-chat-input-area textarea {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    resize: none;
    max-height: 100px;
    min-height: 38px;
    font-family: inherit;
    line-height: 1.4;
}
.ai-chat-input-area textarea:focus { outline: none; border-color: #3b82f6; }
.ai-chat-send {
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    height: 38px;
    white-space: nowrap;
}
.ai-chat-send:hover { background: #2563eb; }
.ai-chat-send:disabled { background: #93c5fd; cursor: not-allowed; }

/* 모바일 */
@media (max-width: 640px) {
    #aiChatPanel, #aiChatPanel.ai-expanded {
        bottom: 0;
        right: 0;
        width: 100%;
        height: 90vh;
        border-radius: 16px 16px 0 0;
    }
    .ai-float-btn { bottom: 16px; right: 16px; }
    .ai-chat-resize { display: none; }
}
</style>

<script>
(function() {
    var _aiMessages = [];
    var _aiOpen = false;
    var _aiExpanded = false;
    var chatBox = document.getElementById('aiChatMessages');
    var chatInput = document.getElementById('aiChatInput');
    var sendBtn = document.getElementById('aiSendBtn');
    var panel = document.getElementById('aiChatPanel');

    // sessionStorage로 대화 유지
    var _storageKey = 'kabiseo_ai_chat';
    try {
        var saved = sessionStorage.getItem(_storageKey);
        if (saved) {
            var parsed = JSON.parse(saved);
            _aiMessages = parsed.messages || [];
            if (parsed.display && parsed.display.length > 0) {
                chatBox.innerHTML = '';
                parsed.display.forEach(function(d) {
                    _addMsgEl(d.role, d.text, d.html);
                });
            }
        }
    } catch(e) {}

    function _saveChatState() {
        try {
            var msgs = [];
            chatBox.querySelectorAll('.ai-msg').forEach(function(el) {
                msgs.push({
                    role: el.classList.contains('user') ? 'user' : 'ai',
                    text: el.textContent,
                    html: el.innerHTML !== el.textContent ? el.innerHTML : undefined
                });
            });
            sessionStorage.setItem(_storageKey, JSON.stringify({
                messages: _aiMessages,
                display: msgs
            }));
        } catch(e) {}
    }

    function _linkify(text) {
        // /admin/api/ai-export/... → 다운로드 버튼
        var t = text.replace(/(?:https?:\/\/[^\s]+)?(\/admin\/api\/ai-export\/[a-f0-9]+)/g,
            '<a href="$1" class="ai-download-link" target="_blank">📥 CSV 다운로드</a>');
        // 일반 URL → 링크
        t = t.replace(/(https?:\/\/[^\s<]+)/g, function(url) {
            if (url.indexOf('ai-export') !== -1) return url; // 이미 처리됨
            return '<a href="' + url + '" target="_blank" rel="noopener">' + url + '</a>';
        });
        return t;
    }

    function _addMsgEl(role, text, rawHtml) {
        var div = document.createElement('div');
        div.className = 'ai-msg ' + (role === 'user' ? 'user' : 'ai');
        if (rawHtml) {
            div.innerHTML = rawHtml;
        } else if (role === 'ai') {
            div.innerHTML = _linkify(_escapeHtml(text));
        } else {
            div.textContent = text;
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function _escapeHtml(text) {
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function _showTyping() {
        var div = document.createElement('div');
        div.className = 'ai-typing';
        div.id = 'aiTyping';
        div.innerHTML = '<span>\u25cf</span><span>\u25cf</span><span>\u25cf</span>';
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function _hideTyping() {
        var el = document.getElementById('aiTyping');
        if (el) el.remove();
    }

    chatInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });

    chatInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendAiMessage();
        }
    });

    window.toggleAiChat = function() {
        _aiOpen = !_aiOpen;
        panel.style.display = _aiOpen ? 'flex' : 'none';
        if (_aiOpen) {
            chatInput.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };

    window.toggleAiSize = function() {
        _aiExpanded = !_aiExpanded;
        panel.classList.toggle('ai-expanded', _aiExpanded);
        document.getElementById('aiSizeBtn').textContent = _aiExpanded ? '⤡' : '⤢';
    };

    // 드래그 리사이즈 (좌상단 코너)
    (function() {
        var handle = document.getElementById('aiResizeHandle');
        var startX, startY, startW, startH;
        handle.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startX = e.clientX; startY = e.clientY;
            startW = panel.offsetWidth; startH = panel.offsetHeight;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });
        function onMove(e) {
            var dw = startX - e.clientX;
            var dh = startY - e.clientY;
            panel.style.width = Math.max(360, startW + dw) + 'px';
            panel.style.height = Math.max(400, startH + dh) + 'px';
        }
        function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        }
    })();

    window.sendAiMessage = function() {
        var text = chatInput.value.trim();
        if (!text) return;

        _addMsgEl('user', text);
        chatInput.value = '';
        chatInput.style.height = 'auto';
        sendBtn.disabled = true;

        _aiMessages.push({role: 'user', content: text});
        _showTyping();

        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 90000);

        fetch('/admin/api/ai-chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({messages: _aiMessages}),
            signal: controller.signal
        })
        .then(function(r) { clearTimeout(timeoutId); return r.json(); })
        .then(function(data) {
            _hideTyping();
            if (data.ok) {
                _addMsgEl('ai', data.reply);
                _aiMessages = data.messages;
            } else {
                _addMsgEl('ai', '\uc624\ub958: ' + (data.error || '\uc54c \uc218 \uc5c6\ub294 \uc624\ub958'));
            }
            _saveChatState();
        })
        .catch(function(err) {
            clearTimeout(timeoutId);
            _hideTyping();
            if (err.name === 'AbortError') {
                _addMsgEl('ai', '\uc751\ub2f5 \uc2dc\uac04\uc774 \ucd08\uacfc\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uc9c8\ubb38\uc744 \ub354 \uac04\uacb0\ud558\uac8c \ud574\uc8fc\uc138\uc694.');
            } else {
                _addMsgEl('ai', '\ub124\ud2b8\uc6cc\ud06c \uc624\ub958\uac00 \ubc1c\uc0dd\ud588\uc2b5\ub2c8\ub2e4. \ub2e4\uc2dc \uc2dc\ub3c4\ud574\uc8fc\uc138\uc694.');
            }
            _saveChatState();
        })
        .finally(function() {
            sendBtn.disabled = false;
            chatInput.focus();
        });
    };

    window.resetAiChat = function() {
        _aiMessages = [];
        chatBox.innerHTML = '<div class="ai-msg ai">\uc548\ub155\ud558\uc138\uc694! \uce94\ud398\uc778 \ub4f1\ub85d/\uc218\uc815, \uc9c4\ud589 \ub370\uc774\ud130 \uc870\ud68c/\uc218\uc815, \uc5d1\uc140 \uc815\ub9ac\ub97c \ub3c4\uc640\ub4dc\ub9bd\ub2c8\ub2e4.</div>';
        try { sessionStorage.removeItem(_storageKey); } catch(e) {}
        fetch('/admin/api/ai-chat/reset', {method: 'POST'});
    };
})();
</script>
